name: Maven PR Checks

on:
  pull_request_review:
    types:
      - submitted

permissions:
  contents: read

jobs:
  compile:
    name: mvn compile
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest

    steps:
      - name: Check out reviewed PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Verify checked out SHA
        run: |
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Compile
        working-directory: ChessGame
        run: mvn compile

  test:
    name: mvn test
    if: github.event.review.state == 'approved'
    needs: compile
    runs-on: ubuntu-latest

    steps:
      - name: Check out reviewed PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Verify checked out SHA
        run: |
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Run tests
        working-directory: ChessGame
        run: mvn test
